<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <title>AI Email Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-grid"></div>

<div class="container">

  <header>
    <div class="logo">
      <div class="logo-mark">✦</div>
      <div>
        <h1>MailMind</h1>
        <span class="tagline">AI Email Intelligence</span>
      </div>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span>AI Online</span>
    </div>
  </header>

  <div class="main-grid">

    <section class="panel">
      <div class="panel-label">// compose</div>
      <div class="field-group">
        <label for="subject">Subject Line</label>
        <input type="text" id="subject" placeholder="What's this email about?"/>
      </div>
      <div class="field-group">
        <label for="body">Email Body</label>
        <textarea id="body" rows="8" placeholder="Paste or type the email content here..."></textarea>
      </div>
      <button id="analyzeBtn" onclick="analyzeEmail()">
        <span class="btn-icon">✦</span>
        <span id="btnText">Analyze Email</span>
      </button>
    </section>

    <section class="panel result-panel">
      <div class="panel-label">// analysis</div>
      <div class="result" id="result">
        <div class="empty-state">
          <span class="empty-icon">✦</span>
          <p>Your analysis will appear here</p>
          <span>Enter an email and click Analyze</span>
        </div>
      </div>
    </section>

  </div>

  <section class="history-section">
    <div class="history-header">
      <div class="panel-label">// recent history</div>
      <button class="clear-btn" onclick="clearHistory()">🗑 Clear All</button>
    </div>
    <div id="history" class="history-grid"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
